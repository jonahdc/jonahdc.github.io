# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'jekyll serve'. If you change this file, please restart the server process.

# Site settings
title: til - Just a Today I Learned blog for anything art, design and development.
email: your-email@domain.com
description: > # this means to ignore newlines until "baseurl:"
  Just a Today I Learned blog for anything art, design and development.
baseurl: "" # the subpath of your site, e.g. /blog
url: "http://til.bgfsh.xyz" # the base hostname & protocol for your site
twitter_username: jonahlogy
github_username:  jonahlogy
# Build settings
markdown: kramdown

defaults:
  -
    scope:
      path: "" # an empty string here means all files in the project
      type: "posts" # previously `post` in Jekyll 2.2.
    values:
      is_post: true
