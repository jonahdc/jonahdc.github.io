---
layout: default
---

  <main role="main">
    <article class="post">
      <header class="post--header wrap__narrow">
        <div class="post--meta">
          {% assign post = site.posts.first %}
          <div class="post--date-container">
            <div class="h-line">
              <span class="post--date small-heading">{{ post.date | date: "%-d %B %Y" }}</span>
            </div>
            <div class="v-line"></div>
          </div>

          <span class="post--category">{{ post.categories.first }}</span>
        </div>
        <h1 class="post--title">{{ post.title }}</h1>

      </header>
      <div class="post--body">
        {{ post.content }}
      </div>
    </article>
  </main>
